<!DOCTYPE html>
<html>
<head>
    <title>Leaving Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .url {
            color: #007bff;
            font-weight: bold;
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #7C0818;
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 4px;
            width: 50%;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #9D2132;
        }

        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 14px;
        }
    </style>
    <script>
        var _paq = window._paq = window._paq || [];
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);
        (function () {
            var u = "https://mato.example.com/";
            _paq.push(['setTrackerUrl', u + 'matomo.php']);
            _paq.push(['setSiteId', '10']);
            var d = document, g = d.createElement('script'), s = d.getElementsByTagName('script')[0];
            g.async = true;
            g.src = u + 'matomo.js';
            s.parentNode.insertBefore(g, s);
        })();
    </script>
</head>
<body>
<div class="container">
    <h1>External Link</h1>
    <p>You are about to leave and navigate to another website:</p>
    <p class="url" id="externalLink"></p>
    <p>Please note that this external link was not created by our site, and we do not endorse or take responsibility for its content.</p>
    <a href="#" id="continueButton" class="button">Continue</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const externalUrl = decodeURIComponent(decodeURIComponent(urlParams.get('url')));
    if (externalUrl) {
        const validUrl = externalUrl.startsWith('http') ? externalUrl : 'http://' + externalUrl;
        document.getElementById('externalLink').textContent = validUrl;
        document.getElementById('continueButton').href = validUrl;
    } else {
        document.getElementById('externalLink').textContent = 'No external URL provided.';
        document.getElementById('continueButton').style.display = 'none';
    }
</script>
</body>
</html>

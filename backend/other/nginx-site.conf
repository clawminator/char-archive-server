limit_req_zone $http_x_forwarded_for zone=reslimit:10m rate=30r/m;
limit_req_zone $http_x_forwarded_for zone=download:10m rate=1r/s;
limit_req_zone $http_x_forwarded_for zone=searchlimit:10m rate=1r/s;
limit_req_status 429;
limit_conn_status 429;

server
{
  listen 443 ssl http2 default_server;
  server_name _;

  proxy_read_timeout 120;
  proxy_connect_timeout 120;
  proxy_send_timeout 120;

  #proxy_hide_header "Access-Control-Allow-Origin";
  #add_header "Access-Control-Allow-Origin" "*" always;

  add_header Content-Security-Policy "default-src 'self' char-archive.example.com mato.example.com; script-src 'self' 'unsafe-inline' char-archive.example.com mato.example.com; style-src 'self' 'unsafe-inline' char-archive.example.com; img-src 'self' char-archive.example.com mato.example.com data:; font-src 'self' char-archive.example.com; connect-src 'self' char-archive.example.com mato.example.com; media-src 'self' char-archive.example.com data:; object-src 'self' char-archive.example.com; frame-src 'self' char-archive.example.com; worker-src 'self' char-archive.example.com; manifest-src 'self' char-archive.example.com; form-action 'self' char-archive.example.com; base-uri 'self' char-archive.example.com;";

  proxy_set_header Host "char-archive.example.com";

  location /api/archive
  {
    proxy_pass http://127.0.0.1:5500;
  }

  location /api/client/msg
  {
    proxy_pass http://127.0.0.1:5002/msg;
  }

  location /api/file/download
  {
    proxy_hide_header "Cache-Control";
    add_header "Cache-Control" "no-store" always;
    limit_req zone=download;
    proxy_pass http://127.0.0.1:8081;
  }

  # Rate-limit the search endpoint
  location /api/file/search
  {
    limit_req zone=searchlimit nodelay;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_pass http://127.0.0.1:8081/api/search;
  }

  location = /api/file/client/health
  {
    proxy_pass http://127.0.0.1:8081/api/client/health;
  }
  location = /api/file/client/restricted-download
  {
    proxy_pass http://127.0.0.1:8081/api/client/restricted-download;
  }

  location /api/file
  {
    proxy_pass http://127.0.0.1:8081;
  }

  location /
  {
    root /var/www/html;
    index index.html;
    try_files $uri $uri/ =404;
  }

  location /external-link
  {
    root /var/www/html;
    try_files $uri $uri/ =404;
    rewrite ^/external-link$ /external-link.html last;
  }

  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
  include /etc/nginx/snippets/ssl-params.conf;
}

server
{
  listen 9090 ssl http2 default_server;
  server_name _;
  proxy_read_timeout 500;
  proxy_connect_timeout 500;
  proxy_send_timeout 500;
  location /
  {
    proxy_pass http://127.0.0.1:5001;
  }
  ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;
  include /etc/nginx/snippets/ssl-params.conf;
}
